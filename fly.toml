app = "captains-log"
primary_region = "lax"

[build]

[env]
  DB_PATH = "/data/captain_log.db"
  USER_NAME = "Steve"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[mounts]]
  source = "captains_log_data"
  destination = "/data"
